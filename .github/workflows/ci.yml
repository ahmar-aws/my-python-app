name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pytest test_app.py -v --tb=short
    
    - name: Run linting
      run: |
        pip install pylint
        pylint app.py --exit-zero
    
    - name: Check code style
      run: |
        pip install flake8
        flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Run application
      run: |
        timeout 5 python app.py &
        sleep 2
        curl http://localhost:5000/ || echo "Application started"

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create distribution package
      run: |
        mkdir -p dist
        cp app.py dist/
        cp requirements.txt dist/
        cp test_app.py dist/
        cp README.md dist/ 2>/dev/null || true
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-app
        path: dist/
    
    - name: Build summary
      run: |
        echo "✅ Build completed successfully"
        echo "Python version: $(python --version)"

deploy-ec2:
  runs-on: ubuntu-latest
  needs: build
  if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  
  steps:
  - name: Checkout code
    uses: actions/checkout@v4
  
  - name: Deploy to EC2
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
    run: |
      # Create SSH directory
      mkdir -p ~/.ssh
      
      # Add EC2 key
      echo "$EC2_PRIVATE_KEY" > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      
      # Add EC2 to known_hosts
      ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null
      
      # Copy code to EC2
      scp -i ~/.ssh/id_rsa -r . $EC2_USER@$EC2_HOST:/home/ubuntu/my-python-app/
      
      # Run deployment script on EC2
      ssh -i ~/.ssh/id_rsa $EC2_USER@$EC2_HOST 'bash /home/ubuntu/deploy.sh'
      
      echo "✅ Deployment to EC2 complete!"
  
  - name: Verify Deployment
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
    run: |
      sleep 3
      curl -s http://$EC2_HOST:5000/ | head -20
      echo ""
      echo "✅ Application is live!"
